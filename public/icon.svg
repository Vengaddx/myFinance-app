<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep navy-to-midnight gradient — financial trust, premium feel -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1628"/>
      <stop offset="100%" stop-color="#0E3060"/>
    </linearGradient>
    <!-- Subtle inner glow at top — Apple-style light source -->
    <radialGradient id="topglow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background fill -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- Top light bloom (Apple icons have a subtle upper highlight) -->
  <rect width="1024" height="1024" fill="url(#topglow)"/>

